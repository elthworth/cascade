# TESTNET config — pass with `--chain-toml chain.testnet.toml` to validator/trainer.
# Kept separate from the mainnet template (chain.toml) so storage never collides
# across networks: distinct netuid, buckets, and state DBs. Values that differ
# from the mainnet template are tagged TESTNET; see chain.toml for key docs.

schema_version = 1

[subnet]
netuid = 259                     # testnet: cascade subnet (owner-registered)
name = "cascade"
description = "Synthetic time-series training data, KOTH on CRPS + MASE of a Toto2-4M trained from scratch."

[generator]
corpus_n_series      = 16384     # series drawn from each generator per training run
min_length           = 64        # per-series length band (timesteps)
max_length           = 4096      # keep in lockstep with [training] context_length
max_total_points     = 2_000_000_000
max_generate_seconds = 600       # TESTNET: shorter stall window to fit the ~6-min heat budget (mainnet 1800)
max_memory_mb        = 4096      # rlimit for the generation sandbox
max_repo_mb          = 128       # cap on the fetched submission (code-only, no weights)
max_channels         = 1         # per-series variates; 1 = univariate
# Structural data-quality gates (see chain.toml).
max_abs_value        = 0.0       # 0.0 = cast-safe float32 ceiling; always applied
reject_constant      = false     # reject flat (zero-range) series (parked for v1)
max_dup_fraction     = 0.05      # cache_reuse only: max fraction of exact byte-duplicate series
# Generation sandbox (see chain.toml). Testnet keeps the permissive defaults;
# on mainnet set sandbox_strict = true or use a digest-pinned container.
sandbox_mode   = "subprocess"
sandbox_image  = ""
sandbox_python = "python3"
sandbox_strict = false

[training]
# The FIXED training contract — identical for king and challenger; folded into
# contract_digest. See chain.toml for the full key docs.
base_arch          = "toto2"
arch_preset        = "toto2-4m"
base_arch_digest   = "953e40d292e037ea07ffea25ae1fdf2e8b7dc8990276c081fa67fb4371396147"  # recompute with `cascade-trainer --offline`
# architecture (head_dim fixed at 64 across the Toto2 family; patch_size 32)
d_model            = 256
num_layers         = 4
num_heads          = 4
head_dim           = 64
patch_size         = 32
mlp_expansion      = 2
d_ff               = 688         # exact FFN hidden width from Datadog/Toto-2.0-4m config.json
num_quantiles      = 9           # 9-level pinball head (0.1..0.9) — matches [eval]/scoring
# objective / masking (Toto 2.0 Contiguous Patch Masking + quantile head)
masking            = "contiguous_patch"
cpm_c_max          = 16
cpm_p_max          = 0.4
input_transform    = "arcsinh_causal"
# I/O lengths — must match [eval] so the trained model fits the eval windows
context_length     = 4096
horizon            = 64
# Token-count-enforced compute budget (see chain.toml).
target_train_hours          = 0.25     # TESTNET: 15-min final budget per model (mainnet 3.0)
ref_throughput_tokens_per_s = 185000   # MEASURE on your reference GPU; sizes the budget
warmup_fraction             = 0.05
batch_size                  = 64       # Toto 2.0 global batch size
# optimiser (u-muP transfer: tune once on a small proxy width, pin the result)
optimizer          = "normuon_adamw"
base_lr            = 4e-3        # u-muP width-independent learning rate
weight_decay       = 0.05
lr_schedule        = "warmup_cosine"
umup_base_d_model  = 256         # proxy width the HPs were tuned at
train_seed_salt    = 1337        # mixed into the (shared) training seed
max_train_seconds  = 900         # TESTNET: cap = the 15-min final budget (mainnet 10800)
# Corpus feed mode (see chain.toml): stream_cpu | stream_gpu | cache_reuse.
# TESTNET uses stream_gpu: the base generator imports torch, which stream_cpu's
# RLIMIT_AS cap (max_memory_mb) kills on import.
corpus_mode = "stream_gpu"
# GPU SKU pin for byte-exact re-derivation (see chain.toml). Empty = only
# require king and challenger to match each other.
expected_gpu = ""
# Training-runtime image pin (see chain.toml). Empty = unpinned — fine for testnet.
train_image_digest = ""

# Extra final-stage sizes (see chain.toml). 20M (Toto2-22M) is DISABLED at
# launch; use testnet to validate the multi-size path first.
# [[training.sizes]]
# arch_preset                 = "toto2-22m"
# base_arch_digest            = "c7ecca53ed939eabfc34ccdb8a698d69101526c24f299efa21c0c0c288c96792"
# d_model                     = 512
# num_layers                  = 8
# num_heads                   = 8
# mlp_expansion               = 2
# ref_throughput_tokens_per_s = 90000

[round]
# Two-stage (heat → final) selection. TESTNET uses a short epoch so rounds turn
# over quickly for iteration (mainnet template = 7200 ≈ 24h).
epoch_blocks     = 900    # ~3h at 12s blocks
round_hours      = 3.0    # informational
heat_train_hours = 0.1    # cheap screen per competitor (testnet: tiny)
heat_n_windows   = 64     # screening eval windows (testnet: small/fast)
heat_num_samples = 10     # samples per window in the heat (0 = reuse [eval] num_samples)
# Heat wall-clock cap (see chain.toml). Testnet floor is low so the ~6-min heat
# budget really is the cap.
heat_guard_factor        = 1.0
heat_guard_floor_seconds = 300
finalists        = 1      # challengers promoted from the heat to the final
one_submission_per_hotkey = false   # TESTNET: relaxed — a hotkey re-competes every epoch (mainnet true)
# Scaling seam (see chain.toml): screen at screen_size, judge the throne at throne_sizes.
screen_size  = "toto2-4m"
throne_sizes = ["toto2-4m"]

[eval]
# Held-out eval windows, private and rotating per round (see chain.toml).
eval_dataset   = "cascade-private-v1"  # identifier the validator matches on
eval_source    = "private-rotating"    # rotating private pool (vs a fixed public set)
window_pool    = ""                    # set out-of-band (not committed): the testnet
                                       # eval-pool Hub/hf ref (see docs/EVAL_POOL.md)
num_samples    = 40              # TESTNET: reduced for CPU eval speed (mainnet 100)
n_windows      = 300             # TESTNET: > min_windows(200), tractable on CPU (mainnet 2000)
context_length = 4096            # must match [training]; pool must supply >=4096+horizon windows
horizon        = 64
# TESTNET: cap datasets per suite for the Cascade king bench stamp — with
# cascade_enabled = true the full battery alone can blow the 3h epoch.
cascade_bench_max_series = 3
# Public-benchmark no-regression gate data (see chain.toml).
gift_gate_datasets    = ""       # gift-eval config subset ("" = full 97 configs)
gift_gate_num_samples = 0        # 0 reuses num_samples
gift_gate_data_dir    = ""       # pinned benchmark data dir ("" = suite env vars)
gift_gate_timeout_s   = 3600     # per-checkpoint gift-eval timeout

[scoring]
# King-of-the-hill — single-round, flat-margin dethroning (see chain.toml).
win_margin_start     = 0.02
win_margin_end       = 0.02      # == start ⇒ flat margin
margin_warmup_rounds = 0         # 0 ⇒ no tenure warmup
min_windows          = 200       # below this many common windows, no decision
min_clusters         = 0         # min distinct window clusters for a decision; 0 = off
bootstrap_B          = 10000     # paired-bootstrap resamples
bootstrap_alpha      = 0.05      # one-sided LCB level
dethrone_cp          = 1         # consecutive round wins to take the throne
# Reward routing (see chain.toml).
reward_prior_kings   = 4         # prior distinct kings that share weight with the current king
burn_uid             = 0         # weight sink when no rewarded king is registered
# Public-benchmark no-regression gate (see chain.toml).
gift_gate_mode       = "off"     # "off" | "shadow" (log-only) | "enforce"
gift_gate_tolerance  = 0.03      # relative slack before the challenger fails
gift_gate_min_configs = 15       # shared configs below which the gate is uncomputable
# Cascade — king-reign promotion / warm-start (see chain.toml). TESTNET: enabled
# with a 1-day reign for iteration (mainnet defaults off, reign 7).
cascade_enabled      = true
cascade_reign_days   = 1

[dependencies]
# Allowlist for a generator's requirements.txt (see chain.toml): generators are
# purely algorithmic, no weight files; torch is a compute library only.
max_packages = 16
allowed = [
    "numpy",
    "scipy",
    "pandas",
    "statsmodels",
    "numba",
    "torch",
    # GP/kernel/graph primitives for GP-prior generators (CPU-only generate path)
    "scikit-learn",
    "gpytorch",
    "networkx",
]

[static_guard]
# Blocked imports in a submitted generator.py.
blocked = [
    "socket",
    "urllib",
    "urllib2",
    "urllib3",
    "requests",
    "httpx",
    "http.client",
    "http.server",
    "subprocess",
    "os.system",
    "ctypes",
    "cffi",
    "pickle",
    "marshal",
    "shelve",
    "multiprocessing",
    "asyncio.subprocess",
    "cascade.trainer",
    "cascade.validator",
    "cascade.shared.chain",
]

[storage]
# Hippius storage layer (see chain.toml). Credentials come from the environment:
# HIPPIUS_HUB_TOKEN (or _USERNAME/_PASSWORD), HIPPIUS_S3_ACCESS_KEY / _SECRET_KEY.
hub_registry_url = "https://registry.hippius.com"   # informational; client uses its own default
hub_namespace    = "cascade"                        # Harbor project the robot account can push to;
                                                    # no separate "cascade-testnet" project exists yet
s3_endpoint      = "https://s3.hippius.com"
s3_region        = "decentralized"
manifest_bucket  = "cascade-testnet-manifests"      # TESTNET bucket (mainnet: cascade-manifests)
logs_bucket      = "cascade-testnet-logs"           # TESTNET bucket (mainnet: cascade-logs)
# Eval-pool bucket (see chain.toml). Empty = use the static [eval] window_pool ref.
pool_bucket      = ""                               # e.g. "cascade-eval-pool"
pool_s3_endpoint = ""                               # e.g. Cloudflare R2; empty = Hippius S3 above
pool_s3_region   = ""
# S3-compatible backup of the manifest/receipt bucket (see chain.toml).
# Credentials via BACKUP_S3_ACCESS_KEY / BACKUP_S3_SECRET_KEY.
backup_s3_endpoint = "https://04128c0d5ba104eb6a6b77c898aed78e.r2.cloudflarestorage.com"
backup_s3_region   = ""                             # empty = "auto" (R2's region)
backup_bucket      = ""                             # empty = reuse manifest_bucket name

[manifest]
# Signed training receipts (see chain.toml). trainer_hotkey is the only signer
# a validator trusts.
trainer_hotkey  = "5Cyver53HZaxdn6j9K2W9LyaoGxjz1W3cXHoKcaDyzfjfpHs"  # owner hotkey (uid 0 on netuid 259)
poll_seconds    = 120

[validator]
weight_set_interval_blocks = 180
poll_seconds               = 120
hf_cache_seconds           = 1800
state_db_path              = "validator_state.testnet.db"
# Cascade persistence (see [scoring] cascade_reign_days).
cascade_state_db_path      = "cascade_state.testnet.json"
warm_start_init_path       = "warm_start_init.testnet.json"

[wandb]
# Optional live training dashboards (see chain.toml). Observability only;
# WANDB_API_KEY comes from the environment, never this file.
enabled = true                  # testnet: on so miners can watch live
project = "cascade-testnet"     # PUBLIC wandb project for miners to view
entity  = ""                    # wandb team/user (empty = the API key's default)
mode    = "online"              # online | offline | disabled
