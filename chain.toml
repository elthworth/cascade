# Single source of truth for active subnet configuration. Miners, the trainer,
# and validators all read this file via cascade.shared.config. Schema is versioned.
# Rationale for these settings lives in docs/ (ARCHITECTURE.md, VALIDATOR.md).

schema_version = 1

[subnet]
netuid = 91                      # MAINNET netuid
name = "cascade"
description = "Synthetic time-series training data, KOTH on CRPS + MASE of a Toto2-4M trained from scratch."

[generator]
# Bounds the trainer enforces on every generator's output; a violation
# disqualifies the generator for the round.
corpus_n_series      = 16384     # series drawn from each generator per training run
min_length           = 64        # per-series length band (timesteps)
max_length           = 4096      # keep in lockstep with [training] context_length
max_total_points     = 2_000_000_000
max_generate_seconds = 1800      # wall-clock budget for draining the generator
max_memory_mb        = 4096      # rlimit for the generation sandbox
max_repo_mb          = 128       # cap on the fetched submission (code-only, no weights)
max_channels         = 1         # per-series variates; 1 = univariate
# Structural data-quality gates (enforced by the trainer and `cascade verify`).
max_abs_value        = 0.0       # reject series whose peak |value| exceeds this; 0.0 = float32 ceiling
reject_constant      = false     # reject flat (zero-range) series
max_dup_fraction     = 0.05      # cache_reuse only: max fraction of exact byte-duplicate series; 1.0 disables
# Generation sandbox (trainer-side; never folded into contract_digest).
#   subprocess — rlimited child in a network namespace with a socket guard (default)
#   container  — same child inside docker/podman with hardened flags; requires a
#                digest-pinned sandbox_image and its sandbox_python
sandbox_mode   = "subprocess"
sandbox_image  = ""              # e.g. "ghcr.io/tensorlink-ai/cascade-worker@sha256:<64hex>"
sandbox_python = "python3"       # python inside sandbox_image
sandbox_strict = false           # true on production: no netns => refuse, don't degrade

[training]
# The FIXED training contract — identical for king and challenger; folded into
# contract_digest. Trains a Toto2 backbone from random init on each corpus.
# Arch integers verified against Datadog/Toto-2.0-4m config.json (2026-07-02).
base_arch          = "toto2"
arch_preset        = "toto2-4m"
base_arch_digest   = "953e40d292e037ea07ffea25ae1fdf2e8b7dc8990276c081fa67fb4371396147"  # sha256 of frozen arch+init; recompute with `cascade-trainer --offline`
# architecture (head_dim fixed at 64 across the Toto2 family; patch_size 32)
d_model            = 256
num_layers         = 4
num_heads          = 4
head_dim           = 64
patch_size         = 32
mlp_expansion      = 2
d_ff               = 688         # exact FFN hidden width from the released config.json
num_quantiles      = 9           # 9-level pinball head (0.1..0.9) — matches [eval]/scoring
# objective / masking (Toto 2.0 Contiguous Patch Masking + quantile head)
masking            = "contiguous_patch"
cpm_c_max          = 16
cpm_p_max          = 0.4
input_transform    = "arcsinh_causal"
# I/O lengths — must match [eval] so the trained model fits the eval windows
context_length     = 4096
horizon            = 64
# From-scratch budget, enforced as a fixed token count (hours × ref throughput)
# so king and challenger see identical compute; max_train_seconds is the hard guard.
target_train_hours          = 3.0
ref_throughput_tokens_per_s = 3700000  # 20x (2026-07-15): L40S is ~20x the old 185k ref, so it was
                                        # finishing the budget early; 20x the TOKEN budget, same 3h wall
warmup_fraction             = 0.05
batch_size                  = 64       # Toto 2.0 global batch size
# optimiser (u-muP transfer: tune once on a small proxy width, pin the result)
optimizer          = "normuon_adamw"
base_lr            = 4e-3        # u-muP width-independent learning rate
weight_decay       = 0.05
lr_schedule        = "warmup_cosine"
umup_base_d_model  = 256         # proxy width the HPs were tuned at
train_seed_salt    = 1337        # mixed into the (shared) training seed
max_train_seconds  = 10800       # hard wall-clock cap; a time stop is flagged deadline_hit
# Corpus feed mode (folded into contract_digest):
#   stream_cpu  — live-stream from a CPU generator; byte-exact reproducible
#   stream_gpu  — live-stream from a GPU generator; tolerance/same-hardware audit
#   cache_reuse — draw a fixed corpus once, multi-pass under the budget; byte-exact
corpus_mode = "stream_cpu"
# Pin the GPU SKU for byte-exact re-derivation (exact torch device name, e.g.
# "NVIDIA H100 80GB HBM3"). Empty = only require king and challenger to match.
expected_gpu = "NVIDIA L40S"     # exact nvidia-smi device string; king+challenger must
                                  # train on identical silicon (folds into contract_digest;
                                  # unit fixtures neutralize this in tests/conftest.py)
# Pin the training-runtime image (digest-pinned worker-image ref) and inject the
# same digest as CASCADE_TRAIN_IMAGE_DIGEST into each pod env; final runs refuse
# a mismatched runtime. Folded into contract_digest. Empty = unpinned.
train_image_digest = "sha256:2126219a8909797e313b1688ff7b27a666eb7376652cd0d322e229e91cfe01b4"
# ^ ghcr.io/tensorlink-ai/cascade-worker@worker-v0.3.1 (2026-07-16, built from
# 56d40c7 — 20x budget + pinned [dependencies] generator allowlist baked).
# NOTE the baked chain.toml inside the image carries an EMPTY pin (an image
# cannot contain its own digest); enforcement is launch-env injection + the
# provisioner health gate, and contract_digest is computed orchestrator-side
# only.
# Prior pin: sha256:f08d8c52a19616… = ghcr.io/tensorlink-ai/cascade-worker@worker-v0.3.0
# (2026-07-15, built from ed2f4a1 — 20x budget but MISSING the [dependencies]
# generator allowlist; generators importing pandas failed heats — do not reuse).
# Prior pin: sha256:46bc78fa0ddd… = ghcr.io/tensorlink-ai/cascade-worker@worker-v0.2.0
# (built from main incl. PRs #76–#98; bakes the OLD 185k budget — do not reuse).
# Re-pin protocol: the digest folds into contract_digest ⇒ trainer AND
# validators restart together at an epoch boundary, pods pull the new image.

# Extra final-stage model sizes. Each [[training.sizes]] is trained alongside
# the primary in the final; the throne is decided on the COMBINED score. A size
# overrides only shape fields + digest + throughput; all else inherits [training].
#
# 20M (Toto2-22M) is DISABLED at launch. Before enabling: pin the arch to the
# released Datadog/Toto-2.0-22m config.json, measure throughput, and recompute
# base_arch_digest with `cascade-trainer --offline`.
# [[training.sizes]]
# arch_preset                 = "toto2-22m"
# base_arch_digest            = "c7ecca53ed939eabfc34ccdb8a698d69101526c24f299efa21c0c0c288c96792"
# d_model                     = 512
# num_layers                  = 8
# num_heads                   = 8       # head_dim stays 64 ⇒ d_model = num_heads × 64
# mlp_expansion               = 2
# ref_throughput_tokens_per_s = 90000   # MEASURE on the reference GPU for THIS size

[round]
# Daily round cadence + two-stage (heat → final) selection. The base seed is the
# chain block hash at the epoch boundary; only commitments revealed strictly
# before the boundary are eligible.
epoch_blocks     = 7200   # ≈24h at a 12s block time
round_hours      = 24.0   # informational: wall-clock span of an epoch
heat_train_hours = 0.5    # cheap screening budget per competitor (on screen_size)
heat_n_windows   = 256    # eval windows the heat screens on
heat_num_samples = 20     # sample forecasts per window in the heat (0 = reuse [eval] num_samples)
# Heat wall-clock cap: max(heat_guard_factor × heat_train_hours, floor), never
# above max_train_seconds. RAISE the factor if heat pods are a slower SKU than
# the reference box, else every heat time-truncates.
heat_guard_factor        = 1.0
heat_guard_floor_seconds = 900
finalists        = 1      # challengers promoted from the heat to the final (top-N)
# Anti-spam: a challenger hotkey that has entered a heat is burned and must
# re-register to resubmit. Set false only on a throwaway testnet.
# Go-live gate: only commitments revealed at/after this block ever compete
# (0 = off). MAINNET: set to the announced launch block AT LAUNCH so netuid
# squatters / rehearsal commits from before the official start never enter a
# round (and never burn their one submission).
commit_floor_block = 8622922
one_submission_per_hotkey = true
# Genesis baseline king (burn-until-dethroned): a PUBLIC Hippius generator ref
# (repo@digest). When set, the trainer trains THIS generator as the king
# whenever no on-chain champion has a resolvable commitment — a fixed,
# un-earnable floor — and the validator BURNS emission to burn_uid until a real
# miner dethrones it (the king entry carries a sentinel uid = -1). Empty = off:
# promote the lowest-UID miner to interim king (legacy behaviour).
genesis_generator_ref = "cascade/genesis-baseline@sha256:56c68bdac31718db7c59708c9678b19347fe7ef2f8a696bdd5f3ad4548e17a65"
# submissions_db_path = "trainer_submissions.json"  # relative ⇒ under --work-root
# Scaling seam: which size the heat screens at, and which size(s) decide the
# throne. arch_preset names from the size registry; >1 throne size = combined score.
screen_size  = "toto2-4m"
throne_sizes = ["toto2-4m"]

[eval]
# Held-out eval windows, identical for king and challenger. The slice is private
# and rotates per round (seeded by block hash) — see cascade.validator.windows.
eval_dataset   = "cascade-private-v1"  # identifier the validator matches on
eval_source    = "private-rotating"    # rotating private pool (vs a fixed public set)
window_pool    = ""                    # Hippius Hub ref (repo@digest) of the held-out pool;
                                       # build/push with `cascade-pool build --out ./pool --upload`
                                       # (see docs/EVAL_POOL.md)
num_samples    = 100             # sample forecasts drawn per window
n_windows      = 2000            # eval windows drawn per round from the pool
context_length = 4096            # must match [training]; pool must supply >=4096+horizon windows
horizon        = 64

# Public-benchmark logging (LOG-ONLY; never feeds scoring/weights/KOTH). Runs
# out of process via the benchmarks/ sidecar; best-effort. See benchmarks/README.md.
run_benchmarks        = false    # off by default — opt in per validator
benchmark_project_dir = "benchmarks"  # path to the sidecar project
benchmark_suites      = []       # subset of ["gift-eval","boom","time"]; [] = all three
benchmark_num_samples = 0        # 0 reuses num_samples above
benchmark_max_series  = 0        # cap datasets/tasks for a fast smoke run; 0 = full benchmark
# Public-benchmark no-regression gate data (CONSENSUS; used when [scoring]
# gift_gate_mode != "off"). Enforcing validators need the data pinned locally.
gift_gate_datasets    = ""       # gift-eval config subset ("" = full 97 configs)
gift_gate_num_samples = 0        # 0 reuses num_samples
gift_gate_data_dir    = ""       # pinned benchmark data dir ("" = suite env vars)
gift_gate_timeout_s   = 3600     # per-checkpoint gift-eval timeout

[scoring]
# King-of-the-hill — single-round, flat-margin dethroning; the margin does not
# ramp with tenure. For sticky/tenure behaviour set dethrone_cp > 1 and
# win_margin_end > win_margin_start with margin_warmup_rounds > 0.
win_margin_start     = 0.02
win_margin_end       = 0.02      # == start ⇒ flat margin
margin_warmup_rounds = 0         # 0 ⇒ no tenure warmup
min_windows          = 200       # below this many common windows, no decision
min_clusters         = 0         # min distinct window clusters (pool `source` labels)
                                 # for a decision; raise to ~30 once the pool
                                 # carries source labels. 0 = off.
bootstrap_B          = 10000     # paired-bootstrap resamples
bootstrap_alpha      = 0.05      # one-sided LCB level
dethrone_cp          = 1         # consecutive round wins to take the throne
# Reward routing: weight split across the current king plus up to
# reward_prior_kings previous distinct kings still registered; if none are
# registered, all weight burns to burn_uid. 0 = pure winner-take-all.
reward_prior_kings   = 4
burn_uid             = 0         # weight sink (owner burn slot)
king_decay           = 0.5       # geometric decay across [king, prior kings]: king ∝ 1,
                                  # prior ∝ 0.5, 0.25, … — the king is UNAMBIGUOUSLY the
                                  # highest-incentive UID (king resolution depends on it).
                                  # 1.0 = flat split (ambiguous; do not use in production).
                                 # 1.0 = flat split, <1 skews to the current king
# Public-benchmark no-regression gate (cascade.eval.gift_gate). AND-ed with the
# private-pool decision: can BLOCK a dethrone, never grant one. Start on
# "shadow" to calibrate the tolerance before enforcing.
gift_gate_mode       = "off"     # "off" | "shadow" (log-only) | "enforce"
gift_gate_tolerance  = 0.03      # relative slack before the challenger fails
gift_gate_min_configs = 15       # shared configs below which the gate is uncomputable
# Cascade — king-reign promotion / warm-start (cascade.validator.cascade). After
# cascade_reign_days consecutive undethroned days, the reign's best checkpoint
# becomes the warm-start init and the throne is vacated.
cascade_enabled      = false     # master on/off for warm-start promotion
cascade_reign_days   = 7         # consecutive undethroned days before a Cascade fires

[dependencies]
# Allowlist for a generator's requirements.txt. Generators are purely
# algorithmic — no weight files accepted (see cascade.interface.validation);
# torch is allowed as a compute library for GP/kernel priors only.
max_packages = 16
allowed = [
    "numpy",
    "scipy",
    "pandas",
    "statsmodels",
    "numba",
    "torch",
    # GP/kernel/graph primitives for GP-prior generators (CPU-only generate path)
    "scikit-learn",
    "gpytorch",
    "networkx",
]

[static_guard]
# Blocked imports in a submitted generator.py.
blocked = [
    "socket",
    "urllib",
    "urllib2",
    "urllib3",
    "requests",
    "httpx",
    "http.client",
    "http.server",
    "subprocess",
    "os.system",
    "ctypes",
    "cffi",
    "pickle",
    "marshal",
    "shelve",
    "multiprocessing",
    "asyncio.subprocess",
    "cascade.trainer",
    "cascade.validator",
    "cascade.shared.chain",
]

[storage]
# Hippius storage layer: Hub OCI registry for models/checkpoints/generators
# (pinned by repo@digest), S3 for manifests + logs. Credentials come from the
# environment, never this file: HIPPIUS_HUB_TOKEN (or _USERNAME/_PASSWORD) for
# the registry, HIPPIUS_S3_ACCESS_KEY / HIPPIUS_S3_SECRET_KEY for S3.
hub_registry_url = "https://registry.hippius.com"   # informational; client uses its own default
hub_namespace    = "cascade"                        # repo namespace for trainer/owner pushes
s3_endpoint      = "https://s3.hippius.com"
s3_region        = "decentralized"
manifest_bucket  = "cascade-manifests"              # round-<id>.json + latest.json
logs_bucket      = "cascade-logs"                   # logs/round-<id>/<role>.jsonl
# Eval-pool bucket (daily snapshots + pool/index.json, published with
# `cascade-pool publish`). Empty = use the static [eval] window_pool ref instead.
pool_bucket      = "cascade-eval-pool"              # daily snapshots from publish-pool.yml
# Pool endpoint override (e.g. Cloudflare R2 + POOL_S3_ACCESS_KEY /
# POOL_S3_SECRET_KEY); empty = reuse the Hippius S3 endpoint above.
pool_s3_endpoint = ""
pool_s3_region   = ""
# HuggingFace-Hub dataset used as a manifest/receipt fallback ONLY during a
# Hippius S3 outage (cascade.shared.hippius.HFFallbackStore). Make it a public
# dataset; auth via HF_TOKEN. Empty = no fallback.
hf_backup_repo   = ""                               # e.g. "yourorg/cascade-manifests-mirror"
# S3-compatible BACKUP of the manifest/receipt bucket: dual-writes every object
# and serves reads when Hippius S3 is down. Credentials via
# BACKUP_S3_ACCESS_KEY / BACKUP_S3_SECRET_KEY.
backup_s3_endpoint = "https://04128c0d5ba104eb6a6b77c898aed78e.r2.cloudflarestorage.com"
backup_s3_region   = ""                             # empty = "auto" (R2's region)
backup_bucket      = ""                             # empty = reuse manifest_bucket name

[manifest]
# Signed training receipts in [storage] manifest_bucket. trainer_hotkey is the
# only signer a validator trusts (see OPEN_QUESTIONS.md #1).
trainer_hotkey  = "5FcCsoB2R5M55RdrNrvPQv7xmLJRFzs7R7C73UUSxgUCyfsw"  # owner trainer hotkey (mainnet)
poll_seconds    = 120
# Trust anchor for the public round receipts: the validator hotkey whose
# signature `cascade-audit` requires. Empty = verify against the receipt's
# self-declared signer (audit warns that the signer is unpinned).
validator_hotkey = ""

[validator]
weight_set_interval_blocks = 180
poll_seconds               = 120
hf_cache_seconds           = 1800
state_db_path              = "validator_state.db"
# Cascade persistence (see [scoring] cascade_reign_days): reign clock + reign
# checkpoint log, and the promoted warm-start pointer for the trainer.
cascade_state_db_path      = "cascade_state.json"
warm_start_init_path       = "warm_start_init.json"
# First boot with no local state: inherit the current champion from the signed
# public receipt trail (verified against the pinned [manifest] hotkey) instead
# of judging the next manifest blind. Makes validator join-order irrelevant to
# who holds the throne. Existing state always wins; flip false to opt out.
bootstrap_from_receipts    = true

[wandb]
# Optional live training dashboards (Weights & Biases). Observability only —
# never feeds scoring or weights; held-out eval scores are not sent. One run per
# (round, competitor, size), tagged with the miner hotkey. Requires the [wandb]
# extra; WANDB_API_KEY comes from the environment, never this file.
enabled = true                  # live wandb logging ON (owner 2026-07-18); observability only
project = "cascade"             # wandb project; make it PUBLIC for miners to view
entity  = ""                    # wandb team/user (empty = the API key's default)
mode    = "online"              # online | offline | disabled
