# Single source of truth for active subnet configuration.
# Miners, the trainer, and validators all read this file via
# cascade.shared.config. Schema is versioned.

schema_version = 1

[subnet]
netuid = 0                       # placeholder; set per network (mainnet/testnet)
name = "cascade"
description = "Synthetic time-series training data, KOTH on CRPS + MASE of a Toto2-4M trained from scratch."

[generator]
# Bounds the trainer enforces on every generator's output. A generator that
# violates any of these fails to qualify for the round (it can never affect the
# king's run). From-scratch training wants more *unique* synthetic data than a
# fine-tune does, so the corpus budget is larger here and is a real signal knob.
corpus_n_series      = 16384     # series drawn from each generator per training run
min_length           = 64        # per-series length band (timesteps)
max_length           = 2048
max_total_points     = 2_000_000_000 # raised off 64M; real corpus size is set by corpus_n_series + memory/streaming (see notes)
max_generate_seconds = 1800      # wall-clock budget for draining the generator
max_memory_mb        = 4096      # rlimit for the generation sandbox
max_repo_mb          = 128       # cap on the fetched submission. Generators are code-only
                                 # (purely algorithmic) — no shipped weights — so a repo is
                                 # source + config, a few MB; this is the wall that actually
                                 # makes a distilled model impossible. max_memory_mb /
                                 # max_generate_seconds bound it at runtime.
max_channels         = 1         # per-series variates. 1 = univariate (generators may
                                 # yield 1-D, promoted to (1, L)); raise to enable
                                 # multivariate priors without a schema change.

[training]
# The FIXED training contract — identical for king and challenger. The only
# thing that varies between the two trained models is the generator's data.
#
# cascade trains a Toto2 backbone FROM RANDOM INIT on each corpus (it does not
# fine-tune a released checkpoint): from scratch, the corpus is the only source
# of learned signal. So the whole recipe is pinned here and folded into
# contract_digest. Arch defaults track Datadog/Toto-2.0-4m — pin the exact
# integers and base_arch_digest to that checkpoint's config.json before launch.
base_arch          = "toto2"
arch_preset        = "toto2-4m"
base_arch_digest   = "e2435bcdff9f00540dea47b2c5446327c3ae5477572619603aa0840d8eb39d83"  # sha256 of frozen arch+init (toto2_model.py + arch fields); recompute with `cascade-trainer --offline` if you change either
# architecture (head_dim fixed at 64 across the Toto2 family; patch_size 32)
d_model            = 256
num_layers         = 4
num_heads          = 4
head_dim           = 64
patch_size         = 32
mlp_expansion      = 2
num_quantiles      = 9           # 9-level pinball head (0.1..0.9) — matches [eval]/scoring
# objective / masking (Toto 2.0 Contiguous Patch Masking + quantile head)
masking            = "contiguous_patch"
cpm_c_max          = 16
cpm_p_max          = 0.4
input_transform    = "arcsinh_causal"
# I/O lengths — must match [eval] so the trained model fits the eval windows
context_length     = 4096    # Toto 2.0 training context (Table 1); was 512
horizon            = 64
# from-scratch budget — train each model for ~target_train_hours of GPU on the
# OWNER'S REFERENCE BOX. Enforced as a fixed token count (= hours × reference
# throughput, the train_tokens property) so king and challenger see identical
# compute regardless of data-dependent throughput — a raw 3h timer would let a
# generator win by emitting cheap-to-step data instead of better data, and would
# not reproduce on a re-derived audit run. max_train_seconds is the hard guard.
target_train_hours          = 3.0
ref_throughput_tokens_per_s = 185000   # MEASURE on your reference GPU; sizes the budget
                                        # (3.0h × 3600 × 185000 ≈ 2.0B point-passes)
warmup_fraction             = 0.05
batch_size                  = 64     # Toto 2.0 global batch size (Table 1); was 256
# optimiser (u-muP transfer: tune once on a small proxy width, pin the result)
optimizer          = "normuon_adamw"
base_lr            = 4e-3         # u-muP width-independent learning rate
weight_decay       = 0.05
lr_schedule        = "warmup_cosine"
umup_base_d_model  = 256          # proxy width the HPs were tuned at
train_seed_salt    = 1337        # mixed into the (shared) training seed
max_train_seconds  = 14400       # hard wall-clock guard (> target_train_hours so the
                                  # token budget completes; kills a pathologically slow run)
# corpus feed mode — how generator data reaches the trainer. Identical for king
# and challenger (folded into contract_digest). Three modes to A/B for now:
#   stream_cpu  — live-stream fresh series from a CPU generator, no reuse, until
#                 the token budget. Byte-exact reproducible (rolling digest).
#   stream_gpu  — live-stream from a GPU-resident generator (torch). High
#                 throughput, but audit is tolerance/same-hardware, not byte-exact.
#                 Wired: torch is on the [dependencies] allowlist and the sandbox
#                 has a GPU profile (relaxed RLIMIT_AS + CUDA env). Run the trainer
#                 in a no-egress container, since RLIMIT_AS no longer bounds it.
#   cache_reuse — draw a fixed corpus once, then multi-pass it under the budget.
#                 Byte-exact, but reuses data (some memorisation).
corpus_mode = "stream_cpu"
# Pin the GPU model for BYTE-EXACT re-derivation. The reference trainer runs
# deterministically (deterministic cuBLAS/cuDNN, math attention, seeded RNG), so
# on a fixed GPU SKU king/challenger and any audit re-run reproduce the exact
# checkpoint. Set this to the exact torch device name of the SKU you rent on both
# pods (e.g. "NVIDIA H100 80GB HBM3" — check with torch.cuda.get_device_name(0));
# the validator then rejects any manifest whose entries weren't trained on it.
# Empty = only require king and challenger to match each other.
expected_gpu = ""

# Extra final-stage model sizes. The [training] block above is the PRIMARY size
# (the small rung the cheap heat screens on); each [[training.sizes]] below is
# trained alongside it in the final, and the throne is decided on the COMBINED
# score across all sizes (one king, scaling-aware). Each size overrides only the
# width/depth fields plus its own frozen-arch digest and reference throughput;
# everything else (head_dim, patch_size, objective, optimiser, budget hours) is
# inherited from [training], so a size cannot diverge on anything but its shape.
# With NO [[training.sizes]] block, rounds are single-size (the 4M primary only).
#
# === 20M (Toto2-22M) is DISABLED at launch ===
# Uncomment the block below to add the 20M size to the final — the trainer then
# trains king + finalist at both sizes and the validator decides ONE throne on
# the combined 4M+20M score. Before enabling: pin d_model/num_layers/num_heads to
# the released Datadog/Toto-2.0-22m config.json, measure its throughput, and
# recompute base_arch_digest with `cascade-trainer --offline`.
# [[training.sizes]]
# arch_preset                 = "toto2-22m"
# base_arch_digest            = "c7ecca53ed939eabfc34ccdb8a698d69101526c24f299efa21c0c0c288c96792"  # sha256 of this size's frozen arch+init; recompute with `cascade-trainer --offline`
# d_model                     = 512
# num_layers                  = 8
# num_heads                   = 8       # head_dim stays 64 across the family ⇒ d_model = num_heads × 64
# mlp_expansion               = 2
# ref_throughput_tokens_per_s = 90000   # MEASURE on the reference GPU for THIS size (larger ⇒ slower)

[round]
# Daily round cadence + two-stage (heat → final) selection.
# One round per epoch (~24h). The base seed is the chain block hash at the epoch
# boundary, so the whole day shares one RoundSeeds (identical random init for
# every heat and final training). Only commitments revealed strictly BEFORE the
# boundary are eligible — commit late and you compete in the next round.
epoch_blocks     = 7200   # ≈24h at a 12s block time (set to your network's block time)
round_hours      = 24.0   # informational: wall-clock span of an epoch
heat_train_hours = 0.5    # cheap screening budget per competitor (on screen_size)
heat_n_windows   = 256    # eval windows the heat screens on (cheaper than the final's n_windows)
finalists        = 1      # challengers promoted from the heat to the 3h final (top-N)
# Anti-spam: 1 hotkey = 1 submission for the lifetime of the trainer state. A
# challenger hotkey that has entered a heat is burned (persisted); it must
# re-register (new UID, paying the cost) to resubmit — so a miner can't cheaply
# re-roll a generator against the throne. Set false only on a throwaway testnet.
one_submission_per_hotkey = true
# submissions_db_path = "trainer_submissions.json"  # relative ⇒ under --work-root
# Scaling seam: which size the heat screens at, and which size(s) the final trains
# + the throne is judged on. Both are arch_preset names from the size registry
# ([training] primary + any [[training.sizes]]). At launch both are the 4M primary
# (single-size rounds). To promote a rung later, just point these at a bigger size
# — e.g. screen_size = "toto2-4m", throne_sizes = ["toto2-22m"] — no code change.
# throne_sizes with >1 entry = combined-score throne pooled across those sizes.
screen_size  = "toto2-4m"
throne_sizes = ["toto2-4m"]

[eval]
# Held-out eval windows. The SAME windows are scored for king and challenger,
# which is what makes the comparison a controlled measurement. The slice is
# private and ROTATES per round (seeded by the block hash) so a generator cannot
# distribution-match a fixed public benchmark — see cascade.validator.windows.
eval_dataset   = "cascade-private-v1"  # identifier the validator matches on
eval_source    = "private-rotating"      # rotating private pool (vs a fixed public set)
window_pool    = ""                       # Hippius Hub ref (repo@digest) of the held-out pool
                                          # (.npy/.npz series + optional metadata.json). Build,
                                          # push, and get the ref to pin here with:
                                          #   cascade-pool build --out ./pool --upload
                                          # (see docs/EVAL_POOL.md and cascade.pool).
num_samples    = 100             # sample forecasts drawn per window
n_windows      = 2000            # eval windows drawn per round from the pool
context_length = 4096            # must match [training]; pool must supply >=4096+horizon windows
horizon        = 64

# ── Public-benchmark logging (LOG-ONLY; never feeds scoring/weights/KOTH) ──────
# When a challenger dethrones the king, the validator optionally scores the new
# king's checkpoint on public benchmarks (GIFT-Eval, BOOM, TIME) and LOGS the
# numbers — purely diagnostic, to track the network's best model against
# published leaderboards. These run OUT OF PROCESS via the `benchmarks/` sidecar
# (its gift-eval pins conflict with the cascade env), are best-effort, and a
# failure is logged and ignored. Requires `uv` and a synced sidecar env
# (`uv sync --project benchmarks`); see benchmarks/README.md.
run_benchmarks        = false     # off by default — opt in per validator
benchmark_project_dir = "benchmarks"  # path to the sidecar project (relative to cwd or absolute)
benchmark_suites      = []        # subset of ["gift-eval","boom","time"]; [] = all three
benchmark_num_samples = 0         # samples per benchmark forecast; 0 reuses num_samples above
benchmark_max_series  = 0         # cap number of datasets/tasks for a fast smoke run; 0 = full benchmark

[scoring]
# King-of-the-hill — single-round, flat-margin dethroning (teutonic-style).
# A challenger takes the throne the moment ONE round clears the win margin, and
# the margin does NOT ramp with the king's tenure: every king is equally
# challengeable (no "entrenched king" bonus). To restore the sticky/tenure
# behaviour, set dethrone_cp > 1 and win_margin_end > win_margin_start with
# margin_warmup_rounds > 0.
win_margin_start     = 0.02      # flat win margin (kept == win_margin_end ⇒ no tenure ramp)
win_margin_end       = 0.02      # equal to start; with margin_warmup_rounds = 0 the margin
                                 # is constant at this value regardless of tenure
margin_warmup_rounds = 0         # 0 ⇒ no tenure warmup (flat margin)
min_windows          = 200       # below this many common windows, no decision
bootstrap_B          = 10000     # paired-bootstrap resamples
bootstrap_alpha      = 0.05      # one-sided LCB level
dethrone_cp          = 1         # consecutive round wins to take the throne (1 = single-round)
# Reward routing (teutonic-style): equal weight split across the current king
# plus up to `reward_prior_kings` previous DISTINCT kings that are still
# registered. If none of them are registered, all weight burns to `burn_uid`.
# Set reward_prior_kings = 0 for pure winner-take-all on the current king.
reward_prior_kings   = 4         # prior distinct kings that share weight with the current king
burn_uid             = 0         # weight sink when no rewarded king is registered (owner burn slot)

[dependencies]
# Allowlist for a generator's requirements.txt — supply-chain restriction.
# Generators are PURELY ALGORITHMIC: they compete on the data-generating prior,
# not on shipped learned weights, so NO weight files of any kind are accepted
# (the repo-layout check rejects pickle checkpoints AND code-free containers like
# safetensors — see cascade.interface.validation). torch stays allowed as a
# COMPUTE library for GP/kernel priors (gpytorch builds on it), not as a way to
# ship a distilled model. Still hash-locked and capped at max_packages.
max_packages = 16
allowed = [
    "numpy",
    "scipy",
    "pandas",
    "statsmodels",
    "numba",
    "torch",
    # GP/kernel-family priors (TempoPFN GP-prior, KernelSynth, CauKer). The base
    # generator draws from Gaussian-process priors with composite kernels and
    # SCM-DAG causal structure; these supply the GP/kernel/graph primitives.
    # CPU-only on the generate path — no GPU (cupy) dependency.
    "scikit-learn",
    "gpytorch",
    "networkx",
]

[static_guard]
# Blocked imports in a submitted generator.py.
blocked = [
    "socket",
    "urllib",
    "urllib2",
    "urllib3",
    "requests",
    "httpx",
    "http.client",
    "http.server",
    "subprocess",
    "os.system",
    "ctypes",
    "cffi",
    "pickle",
    "marshal",
    "shelve",
    "multiprocessing",
    "asyncio.subprocess",
    "cascade.trainer",
    "cascade.validator",
    "cascade.shared.chain",
]

[storage]
# Hippius is cascade's storage layer. Two backends:
#   registry (Hippius Hub OCI, https://docs.hippius.com/registry) —
#                     models/checkpoints/generators, pinned by repo@digest.
#                     Miners commit metro-v1:gen:hippius:<repo>@<digest>; the
#                     trainer publishes metro-v1:trained:hippius:<repo>@<digest>.
#   S3 (boto3)      — training manifests + per-round training logs/metrics.
# Credentials are NEVER in this committed file — they come from the environment:
#   registry: HIPPIUS_HUB_TOKEN (or HIPPIUS_HUB_USERNAME + HIPPIUS_HUB_PASSWORD)
#   S3:       HIPPIUS_S3_ACCESS_KEY / HIPPIUS_S3_SECRET_KEY
hub_registry_url = "https://registry.hippius.com"   # informational: the hippius_hub
                                                    # client targets its own default
                                                    # endpoint; recorded here for ops
hub_namespace    = "cascade"                      # repo namespace for trainer/owner pushes
                                                    # (ckpt-r<seed>-<role>, eval-pool)
s3_endpoint      = "https://s3.hippius.com"
s3_region        = "decentralized"
manifest_bucket  = "cascade-manifests"            # round-<id>.json + latest.json
logs_bucket      = "cascade-logs"                 # logs/round-<id>/<role>.jsonl
# Eval-pool bucket: daily snapshots + pool/index.json. When set, validators pull
# the rotating pool from here (deterministic per-round snapshot selection) instead
# of a static [eval] window_pool ref — the owner publishes daily with
# `cascade-pool publish`. Leave empty to use the static ref path.
pool_bucket      = ""                               # e.g. "cascade-eval-pool"
# Point these at Cloudflare R2 (+ POOL_S3_ACCESS_KEY / POOL_S3_SECRET_KEY) to
# publish/pull the pool there; empty = reuse the Hippius S3 endpoint above.
pool_s3_endpoint = ""
pool_s3_region   = ""

[manifest]
# The trainer publishes signed training receipts to the manifest S3 bucket
# ([storage] manifest_bucket) and validators read them. trainer_hotkey is the
# only signer a validator trusts (see OPEN_QUESTIONS.md #1).
trainer_hotkey  = ""             # set to the owner trainer's ss58 hotkey
poll_seconds    = 120

[validator]
weight_set_interval_blocks = 180
poll_seconds               = 120
hf_cache_seconds           = 1800
state_db_path              = "validator_state.db"

[wandb]
# Optional LIVE training dashboards (Weights & Biases). Observability only — the
# numbers here NEVER feed scoring or weights, and the held-out eval scores are
# deliberately not sent (that stays the validator's private, rotating concern).
# When enabled, the trainer mirrors the same per-step records it streams to the
# S3 log ([storage] logs_bucket) into a wandb run — one run per (round,
# competitor, size), tagged with the miner hotkey/uid — so a miner can watch
# their generator train AS IT OCCURS by filtering the (public) project to their
# hotkey. Requires the [wandb] extra (pip install cascade[wandb]). Credentials
# come from the environment (WANDB_API_KEY), never this committed file.
enabled = false                 # set true to turn on live wandb logging
project = "cascade"             # wandb project; make it PUBLIC for miners to view
entity  = ""                    # wandb team/user (empty = the API key's default)
mode    = "online"              # online | offline | disabled
