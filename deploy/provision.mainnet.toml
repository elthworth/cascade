# cascade-provisioner — MAINNET config template (netuid 91, 7200-block epochs).
# Copy to the mainnet box as /root/cascade/provision.toml and fill the two
# <PLACEHOLDER>s. Differences from testnet are commented inline.
#
# GPU policy (from chain.toml [training]):
#   - FINAL duel: expected_gpu = "NVIDIA L40S" — king + challenger MUST train on
#     L40S or the validator rejects the round. The final stage below rents it.
#   - HEAT: screening only, never validator-checked → cheapest liquid silicon
#     (same 4090/A6000 ladder as testnet).
#   - EVAL (elastic validator GPU): priority ladder 3090 → 4090; the validator
#     falls back to local CPU if no pod passes the gate, so this stage can
#     never sink a round.

[provisioner]
trigger_margin_blocks = 45          # ~9 min; COUNT takes <1 min since the raw
                                    # reveal map (PR #112) — margin is boot time
hosts_path            = "/root/cascade/hosts.toml"
state_path            = "/root/cascade/provisioner_state.json"
static_hosts          = "/root/cascade/static_hosts.toml"
max_spend_per_round   = 120.0       # mainnet heats run ~hours on rented pods;
                                    # breaker sized for 2×4x4090 + 1×2x L40S × 24h epoch
# Rules of escalation: a stage whose rung delivers NO healthy pod re-enters
# the SKU ladder at the next (candidate × provider) rung, for at most
# escalate_deadline_s of wall clock from its first rent attempt; a PARTIAL
# fleet below min_viable_fleet of its slot demand gets one same-candidate
# top-up batch. Renting runs in a worker thread (the loop keeps ticking);
# the deadline bounds ONE attempt so the single worker never starves the
# JIT final, the retries, or the next round's trigger. Degrading is NOT
# fine — the orchestrator is CPU-only, so a round with no rented fleet is
# effectively lost (and a locally-trained final can't pass the L40S pin) —
# which is why failed stages keep retrying below.
escalate_deadline_s   = 1800        # 0 = a failed rung is final (no escalation)
min_viable_fleet      = 0.5         # 0 = never top up
# A stage that rented NOTHING re-attempts the full pick→budget→rent pipeline
# on this cadence while enough round remains for it to matter (heat: one
# serial wave still fits; final: full duel hours + boot margin). 0 = one
# attempt per round (the pre-retry behaviour).
rent_retry_cooldown_s = 900
# Money backstop for zombie pools (pods that rent but never boot): dud
# attempts double the stage's retry cooldown (capped 8x), and after this many
# dud pods in one round the stage stops renting entirely. <= 0 = no cap.
max_duds_per_stage    = 8
# Stage-phased rental: rent the L40S duel pods at the trainer's heat_complete
# marker (finalists known — the fleet matches the ACTUAL duel) instead of at
# the margin, saving ~a heat's worth of idle L40S billing per round. If the
# primary L40S rung probes scarce at the margin, the final rents early via
# the ladder — the exception that locks capacity in a thin market.
#
# JIT delivery budget vs the trainer's pre-duel wait (--hosts-wait-seconds,
# launched at 5400s): marker→healthy is ~15-25 min on the happy path (ready
# wait + auth lag + bootstrap + health gate), ~35-70 min when a dud forces a
# replacement or a rung escalates, and ~65-100 min when a whole attempt fails
# and the 15-min retry delivers on attempt two. The trainer polls the hosts
# file every ≤15s during its wait, so delivery latency is the only latency.
# The pathological tail (every timeout maxed: 900s ready + 900s auth + 1800s
# bootstrap per pod, dud + replacement sequential) can exceed the wait — the
# trainer then duels on whatever is on file (static hosts) or locally, and
# the late pods are torn down by the manifest/TTL. Don't shrink the trainer's
# wait below ~5400s with this mode on; on a 24h epoch, waiting costs only
# manifest lateness while a local L40S-pinned duel costs the round.
final_rent_on         = "heat_complete"
eval_hosts_path       = "/root/cascade/eval_hosts.toml"
receipt_prefix        = "receipts/<MAINNET-VALIDATOR-HOTKEY>/"   # teardown latch

# Bootstrap mode (bare pods + rsync + uv sync) until the digest-pinned worker
# image ships — then set image to the GHCR ref
# ghcr.io/tensorlink-ai/cascade-worker@sha256:… and drop bootstrap_script.
image               = ""    # bootstrap mode: EMPTY (omit --image → lium default template).
                            # A template NAME here 400s EVERY lium rental (Invalid docker_image,
                            # 2026-07-14). Set a real digest-pinned docker ref for image-boot mode.
bootstrap_script    = "/root/cascade/deploy/pod_bootstrap.sh"
bootstrap_timeout_s = 1800
pod_user            = "root"
shadeform_ssh_key_id = "<SHADEFORM-SSH-KEY-ID>"  # `curl api.shadeform.ai/v1/sshkeys`

ssh_pubkey    = "~/.ssh/lium_cascade_ed25519.pub"
ssh_key_path  = "~/.ssh/lium_cascade_ed25519"
remote_python = "/root/cascade/.venv/bin/python"
workdir       = "/root/cascade"
chain_toml    = "/root/cascade/chain.toml"       # MAINNET template (netuid 91)
forward_env   = ["HIPPIUS_S3_ACCESS_KEY", "HIPPIUS_S3_SECRET_KEY",
                 "HIPPIUS_HUB_USERNAME", "HIPPIUS_HUB_PASSWORD", "HF_TOKEN"]

[provisioner.pods.shadeform]
user          = "shadeform"
workdir       = "/home/shadeform/cascade"
remote_python = "/home/shadeform/cascade/.venv/bin/python"

# ── HEAT: cheap screening silicon, same ladder proven on testnet ─────────────
# First (candidate × provider) with capacity for the whole fleet wins; a stage
# never mixes SKUs within a round.

[provisioner.heat]
sku          = "NVIDIA GeForce RTX 4090"
market_sku   = "RTX4090"
gpus_per_pod = 4
max_pods     = 8
providers    = ["lium", "shadeform"]
max_price_hr = 2.60
slot_overhead = 1.3

[[provisioner.heat.candidate]]           # fallback 1: 4x A6000
sku          = "NVIDIA RTX A6000"
market_sku   = "A6000"
gpus_per_pod = 4
max_price_hr = 2.40

[[provisioner.heat.candidate]]           # fallback 2: 8x 4090
sku          = "NVIDIA GeForce RTX 4090"
market_sku   = "RTX4090"
gpus_per_pod = 8
max_price_hr = 5.00

[[provisioner.heat.candidate]]           # fallback 3: 8x A6000
sku          = "NVIDIA RTX A6000"
market_sku   = "A6000"
gpus_per_pod = 8
max_price_hr = 4.60

[[provisioner.heat.candidate]]           # fallback 4: 2x 4090
sku          = "NVIDIA GeForce RTX 4090"
market_sku   = "RTX4090"
gpus_per_pod = 2
max_price_hr = 1.30

[[provisioner.heat.candidate]]           # fallback 5 (floor): 2x A6000
sku          = "NVIDIA RTX A6000"
market_sku   = "A6000"
gpus_per_pod = 2
max_price_hr = 1.20

# No 1x rungs: every pod pays the full bootstrap cost (rsync + uv sync) for a
# single lane, and a singles fleet burns max_pods on 8 flaky boxes for 8 slots.
# The 2x rungs are the floor.

# ── FINAL: the contract GPU — provisioner-MANAGED on mainnet ─────────────────
# expected_gpu pins the duel to L40S. Primary: one 2-GPU pod (king + challenger
# train in parallel lanes on identical silicon). Fallback: two 1-GPU pods.
# NOTE: lium mostly lists L40 (a DIFFERENT device — fails the pin); shadeform
# carries true L40S — hence shadeform first for this stage.

[provisioner.final]
sku          = "NVIDIA L40S"
market_sku   = "L40S"
gpus_per_pod = 2
max_pods     = 2
providers    = ["shadeform", "lium"]
max_price_hr = 2.60

[[provisioner.final.candidate]]          # fallback: 1x L40S pods (2 rented)
sku          = "NVIDIA L40S"
market_sku   = "L40S"
gpus_per_pod = 1
max_price_hr = 1.30

# ── EVAL: elastic validator GPU — priority ladder ────────────────────────────
# Rented at each round manifest, torn down at the scored receipt. Priority:
# 3090 (cheapest that fits the bench) → 4090. Caps reflect 2026-07 markets:
# the 3090 pool is often empty/zombie (rentals that never boot), and healthy
# 1x 4090s run ~$0.75/hr — an under-capped fallback rung rents nothing.

[provisioner.eval]
sku          = "NVIDIA GeForce RTX 3090"
market_sku   = "RTX3090"
gpus_per_pod = 1
max_pods     = 1
providers    = ["lium", "shadeform"]
max_price_hr = 0.45

[[provisioner.eval.candidate]]           # priority 2: 1x 4090
sku          = "NVIDIA GeForce RTX 4090"
market_sku   = "RTX4090"
gpus_per_pod = 1
max_price_hr = 0.85
